# EKP Tier 1 — Eval Set v0(W1 Placeholder)
# 
# ⚠️ CRITICAL WARNING — READ BEFORE USE ⚠️
# ============================================================================
# 呢份 file 係 W1 Day 1 嘅 PLACEHOLDER,並非 production-ready ground truth。
# 
# 1. 所有 query 由 architect 基於 generic「Ricoh MFP user manual」假設 synthesize
#    出嚟,並未對應實際 100 份 manual 內容。
# 
# 2. 所有 chunk_id 都係 placeholder(`kb-drive_doc-M{NNN}_chunk-{IIII}`),
#    Ricoh 實際 KB 嘅 chunk_id 一定唔同。SME 標註時必須 replace。
# 
# 3. 所有 `annotation.validated` 設為 `false`。SME 完成標註 + sanity check
#    後方可改為 `true`。
# 
# 4. SME W1 Day 2 必須做以下:
#    a. Review 每條 query 係咪 makes sense for 真實 Ricoh manual corpus
#    b. 用 EKP Admin Console 嘅 chunk inspector 搵真正 chunk_id
#    c. 修正 / 刪除 / 新增 query(若 generic assumption 偏離真實 corpus)
#    d. 每條標完設 `annotation.validated: true` + 填 annotator name + date
#    e. 跑 `python -m scripts.validate_eval_set docs/eval-set-v0.yaml` sanity check
#    f. Rename 呢個 file 為 `eval-set-v1.yaml`(v1 = SME-validated)
# 
# 5. POC W4 加入 20 條 real user query 後,file 升級為 `eval-set-v2.yaml`。
# 
# Reference:annotation guideline 詳見 [`eval-methodology.md` §4](./eval-methodology.md)
# ============================================================================

metadata:
  version: "0.1-placeholder"
  created_at: "2026-04-27"
  created_by: "EKP Architect (synthetic, pre-SME)"
  intended_use: "W1 Day 1 baseline scaffold; SME must replace with real ground truth W1 Day 2"
  
  total_queries: 35
  composition:
    synthetic_main: 30
    synthetic_oos: 5
    user_collected: 0      # to be added W4 (target +20)
  
  difficulty_distribution:
    easy: 15
    medium: 11
    hard: 4
    n_a_oos: 5             # OOS queries don't have difficulty
  
  query_type_distribution:
    single_step_lookup: 18
    multi_step_synthesis: 9
    troubleshooting: 3
    oos: 5
  
  domain_assumption:
    primary: "Ricoh MFP (Multi-Function Printer) — print/copy/scan/fax operations"
    secondary: "Device admin — network, user management, firmware"
    tertiary: "Maintenance & troubleshooting — paper jam, toner, error codes"
    quaternary: "RMA / service workflow (inferred from sample filename)"
    confidence: "low — based on generic Ricoh product family,not actual corpus inspection"

  validation_status: "UNVALIDATED — all queries are placeholders awaiting SME review"

