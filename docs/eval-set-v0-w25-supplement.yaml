# EKP W25 image-association-deep-fix — Supplementary eval set
#
# Authored 2026-05-23 as Path A response to W25 F2 R6 active-flip catch:
# eval-set-v0.yaml queries are Ricoh MFP synthetic placeholders that
# don't match current dev KBs (sample-doc-with-image-1 = DCE Integration
# Platform Implementation Plan + 2 archived test KBs). Without a corpus-
# matched eval set, F2.3 Gate 1 R@5 re-verify against eval-set-v0
# produces meaningless keyword-fallback numbers.
#
# This supplement targets the ACTUAL dev KB `sample-doc-with-image-1`
# (DCE Integration Platform Implementation Plan, 26 pages, ~121 chunks
# pre-W25, 8 embedded screenshot images) with hand-authored queries +
# expected_answer_keywords that:
#   • Text queries (T-series): exercise general retrieval across the doc's
#     real sections (Phase 0 / Team structure / CI-CD pipeline / etc.).
#   • Image queries (I-series): exercise retrieval for sections whose
#     chunks SHOULD carry embedded_images (high-level architecture /
#     integration components / deployment topology). These directly
#     measure the W25 phase goal — image-text association rate.
#
# All entries explicit `annotation.validated: false` → triggers runner.py
# keyword-mode (placeholder acceptable_chunk_ids dropped, scoring uses
# expected_answer_keywords against retrieved top-5 chunk_text). Same
# eval set runs pre-W25 (current 121-chunk Azurite state) and post-W25
# (re-ingested under D3 chunker) → apples-to-apples comparison on a
# single KB across the chunker change.
#
# Per ADR-0033 + W25 plan §3 Phase Gate G1+G2:
#   G1 image_association_rate target ≥ 5/8 image-bearing query
#   G2 Recall@5 absolute ≥ 0.80 (gates.py:17 baseline)
#   non-regression: post-W25 R@5 ≥ pre-W25 R@5 - 5pp envelope

metadata:
  version: "0.0-w25-supplement"
  created_at: "2026-05-23"
  created_by: "AI (W25 F2.2 Path A hand-author per Chris chat 2026-05-23)"
  intended_use: "W25 F2/F4/F6 Gate 1 R@5 + image-association measurement on real dev KB sample-doc-with-image-1"
  status: "UNVALIDATED — not Q14 SME-labelled; runner.py keyword-mode (annotation.validated=false)"

  total_queries: 12
  composition:
    text_queries: 6        # T-series — general retrieval
    image_queries: 6       # I-series — image-bearing section retrieval

  target_kb_id: "sample-doc-with-image-1"
  target_doc:
    doc_id: "dce-integration-platform-implementation-plan"
    title: "DCE Integration Platform Implementation Plan"
    format: "docx"
    pages: ~26
    pre_w25_chunks: 121
    pre_w25_low_value_chunks: 72   # 60% — the W25 trigger signal
    embedded_images: 8

