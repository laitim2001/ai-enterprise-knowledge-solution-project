# EKP Tier 1 — Eval Set v1 DRAFT(AI corpus-aligned,2026-05-04)
#
# ⚠️ DRAFT WARNING — READ BEFORE USE ⚠️
# ============================================================================
# 此檔由 AI 於 2026-05-04 W2 D5 cont 基於 actual indexed corpus survey
# (`ekp-kb-drive-v1` 6 docs / 329 chunks)synthesize 30 main + 5 OOS query。
#
# 與 `eval-set-v0.yaml` 嘅差異:
#   - v0 假設 source corpus 係 Ricoh MFP printer manual(paper jam / toner) —
#     完全不對齊 indexed corpus(actual = Ricoh financial software:
#     FNA-AR / AP / FA / CB / GL / BM)→ Gate 1 R@5 = 0.2278 fail
#   - v1-draft 30 main query topic 直接對應 corpus section titles
#     (AR01-08 Payment Collection / Reverse / Write-Off ...
#      AP01-07 / FA01-08 / CB01-03 / GL01-09 / BU.01)
#
# 仍未完成(awaits SME owner Chris,per Q14):
#   1. `annotation.validated: true` 標 → 仍全部 false
#   2. `acceptable_chunk_ids` real chunk_id 填寫 → 仍 empty list
#   3. `expected_screenshot_chunks` 識別 → 仍 empty
#   4. SME confirm query phrasing 反映實際 user 問法,而非 AI synthesize
#
# Cascade to true `eval-set-v1.yaml`:
#   a. SME(Chris)review 30 main + 5 OOS query make-sense check
#   b. 跑 `python -m scripts.discover_chunk_ids --eval-set docs/eval-set-v1-draft.yaml`
#      → `reports/chunk_id_candidates_v1draft.yaml`
#   c. SME pick acceptable_chunk_ids per query
#   d. Set `validated: true` + 填 annotator + date
#   e. 跑 `python -m scripts.validate_eval_set docs/eval-set-v1-draft.yaml` → exit 0
#   f. Rename `eval-set-v1-draft.yaml` → `eval-set-v1.yaml`(SME-validated)
#   g. POC W4 加 20 條 real user query → eval-set-v2.yaml
#
# Reference:annotation guideline 詳見 `docs/eval-methodology.md` §4
# ============================================================================

